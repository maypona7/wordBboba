services:
  - type: web
    name: wordbboba-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: ALLOWED_ORIGINS
        value: "https://wordbboba.netlify.app,http://localhost:5173"
